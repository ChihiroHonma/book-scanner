name: GAS keep-alive ping

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping GAS endpoint
        env:
          GAS_URL: ${{ secrets.GAS_URL }}
        run: |
          if [ -z "${GAS_URL}" ]; then
            echo "::error::GAS_URL secret is not set"
            exit 1
          fi
          status=$(curl -sS -o /dev/null -w "%{http_code}" -L --max-time 30 "${GAS_URL}?action=ping")
          echo "HTTP status: ${status}"
          if [ "${status}" != "200" ]; then
            echo "::error::Ping failed with HTTP ${status}"
            exit 1
          fi
          echo "Keep-alive ping successful"
